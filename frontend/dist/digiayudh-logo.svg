<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circular border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#gradient)" stroke-width="3"/>
  
  <!-- Main A shape -->
  <path d="M 60 140 L 100 50 L 140 140 Z" fill="url(#gradient)" opacity="0.9"/>
  
  <!-- Inner triangle -->
  <polygon points="95,85 105,85 100,105" fill="white" opacity="0.8"/>
  
  <!-- Arrow/Check mark on right -->
  <path d="M 125 100 L 145 80 L 155 90 L 125 130" fill="url(#gradient)" opacity="0.85"/>
</svg>
